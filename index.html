<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Player Name Game | Powered by Your Dataset</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #1a472a;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .stats-info {
            background: #e8f5e9;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-info {
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .current-letter {
            font-size: 5em;
            font-weight: bold;
            background: white;
            color: #1a472a;
            display: inline-block;
            width: 120px;
            height: 120px;
            line-height: 120px;
            text-align: center;
            border-radius: 50%;
            margin: 10px auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .turn-indicator {
            font-size: 1.2em;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .turn-human {
            background: #3498db;
        }

        .turn-ai {
            background: #e74c3c;
        }

        .players-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ddd;
            transition: all 0.3s;
        }

        .player-card.active {
            border-color: #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        .player-card.eliminated {
            opacity: 0.5;
            background: #e0e0e0;
        }

        .player-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .player-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .player-status {
            font-size: 0.9em;
            color: #666;
        }

        .used-players {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .used-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
        }

        .used-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .used-tag {
            background: #1a472a;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-input {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
        }

        .player-input:focus {
            border-color: #1a472a;
        }

        .submit-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .out-btn {
            background: #e74c3c;
            color: white;
        }

        .new-game-btn {
            background: #3498db;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        .winner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
        }

        .winner-emoji {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .winner-name {
            font-size: 2em;
            font-weight: bold;
            color: #1a472a;
            margin-bottom: 20px;
        }

        .play-again-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #1a472a;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a472a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .players-area {
                grid-template-columns: 1fr;
            }
            .current-letter {
                width: 80px;
                height: 80px;
                line-height: 80px;
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer" style="display: none;">
        <h1>⚽ FOOTBALL PLAYER NAME GAME ⚽</h1>
        <div class="subtitle" id="databaseInfo">Loading database...</div>

        <div class="stats-info" id="statsInfo"></div>

        <div class="game-info">
            <div>🎯 Current Letter</div>
            <div class="current-letter" id="currentLetter">?</div>
            <div class="turn-indicator" id="turnIndicator">🎮 Loading...</div>
        </div>

        <div class="players-area">
            <div class="player-card" id="humanCard">
                <div class="player-icon">👤</div>
                <div class="player-name">YOU</div>
                <div class="player-status" id="humanStatus">Ready</div>
            </div>
            <div class="player-card" id="aiCard">
                <div class="player-icon">🤖</div>
                <div class="player-name">AI</div>
                <div class="player-status" id="aiStatus">Ready</div>
            </div>
        </div>

        <div class="used-players">
            <div class="used-title">📝 Used Players (Cannot repeat)</div>
            <div class="used-list" id="usedList"></div>
        </div>

        <div class="input-area">
            <input type="text" class="player-input" id="playerInput" placeholder="Enter professional footballer name..." disabled>
            <button class="submit-btn" id="submitBtn" disabled>⚡ Submit</button>
        </div>

        <div class="action-buttons">
            <button class="action-btn out-btn" id="outBtn" disabled>🚪 I AM OUT</button>
            <button class="action-btn new-game-btn" id="newGameBtn">🔄 New Game</button>
        </div>

        <div class="message" id="message">
            Loading player database...
        </div>
    </div>

    <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
        <h2>Loading Football Players Database...</h2>
        <p>Please wait while we load your player data</p>
    </div>

    <script>
        // Game state
        let playersByLetter = {};
        let currentLetter = '';
        let currentTurn = 'human';
        let gameActive = true;
        let humanEliminated = false;
        let aiEliminated = false;
        let usedPlayers = [];

        // DOM elements
        const gameContainer = document.getElementById('gameContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const currentLetterEl = document.getElementById('currentLetter');
        const turnIndicatorEl = document.getElementById('turnIndicator');
        const humanCard = document.getElementById('humanCard');
        const aiCard = document.getElementById('aiCard');
        const humanStatus = document.getElementById('humanStatus');
        const aiStatus = document.getElementById('aiStatus');
        const usedListEl = document.getElementById('usedList');
        const playerInput = document.getElementById('playerInput');
        const submitBtn = document.getElementById('submitBtn');
        const outBtn = document.getElementById('outBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const messageEl = document.getElementById('message');
        const databaseInfo = document.getElementById('databaseInfo');
        const statsInfo = document.getElementById('statsInfo');

        function showMessage(msg, isError = false) {
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#ffebee' : '#e8f5e9';
            messageEl.style.color = isError ? '#c62828' : '#2e7d32';
        }

        function updateUsedList() {
            if (usedPlayers.length === 0) {
                usedListEl.innerHTML = '<span style="color: #999;">No players used yet</span>';
            } else {
                usedListEl.innerHTML = usedPlayers.map(p => `<span class="used-tag">${escapeHtml(p)}</span>`).join('');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRandomLetter() {
            const letters = Object.keys(playersByLetter);
            const availableLetters = letters.filter(letter => playersByLetter[letter].length > 0);
            if (availableLetters.length === 0) return 'A';
            return availableLetters[Math.floor(Math.random() * availableLetters.length)];
        }

        function isValidPlayer(playerName, letter) {
            const players = playersByLetter[letter] || [];
            const playerLower = playerName.toLowerCase().trim();
            const exists = players.some(p => p.toLowerCase() === playerLower);
            const notUsed = !usedPlayers.some(p => p.toLowerCase() === playerLower);
            return exists && notUsed;
        }

        function getAIPlayer() {
            const availablePlayers = playersByLetter[currentLetter] || [];
            const unused = availablePlayers.filter(p => !usedPlayers.some(used => used.toLowerCase() === p.toLowerCase()));
            if (unused.length === 0) return null;
            return unused[Math.floor(Math.random() * unused.length)];
        }

        function endGame(winner) {
            gameActive = false;
            playerInput.disabled = true;
            submitBtn.disabled = true;
            outBtn.disabled = true;
            
            const modal = document.createElement('div');
            modal.className = 'winner-modal';
            modal.innerHTML = `
                <div class="winner-content">
                    <div class="winner-emoji">${winner === 'human' ? '🏆🎉' : '🤖💀'}</div>
                    <div class="winner-name">${winner === 'human' ? 'YOU WIN!' : 'AI WINS!'}</div>
                    <p style="margin-bottom: 20px;">${winner === 'human' ? 'Congratulations! You are the champion!' : 'Better luck next time!'}</p>
                    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function switchTurn() {
            if (!gameActive) return;
            
            if (currentTurn === 'human') {
                currentTurn = 'ai';
                turnIndicatorEl.textContent = '🤖 AI\'s Turn';
                turnIndicatorEl.className = 'turn-indicator turn-ai';
                humanCard.classList.remove('active');
                aiCard.classList.add('active');
                playerInput.disabled = true;
                submitBtn.disabled = true;
                outBtn.disabled = true;
                showMessage('AI is thinking...');
                
                setTimeout(() => {
                    if (currentTurn === 'ai' && gameActive && !humanEliminated && !aiEliminated) {
                        const aiPlayer = getAIPlayer();
                        if (aiPlayer) {
                            usedPlayers.push(aiPlayer);
                            updateUsedList();
                            showMessage(`🤖 AI said: ${aiPlayer}`);
                            switchTurn();
                        } else {
                            showMessage('🤖 AI cannot name any player! YOU WIN!', false);
                            aiEliminated = true;
                            aiStatus.textContent = 'ELIMINATED ❌';
                            aiCard.classList.add('eliminated');
                            endGame('human');
                        }
                    }
                }, 1500);
            } else {
                currentTurn = 'human';
                turnIndicatorEl.textContent = '👤 YOUR Turn';
                turnIndicatorEl.className = 'turn-indicator turn-human';
                humanCard.classList.add('active');
                aiCard.classList.remove('active');
                playerInput.disabled = false;
                submitBtn.disabled = false;
                outBtn.disabled = false;
                playerInput.focus();
                showMessage(`Name a professional footballer starting with "${currentLetter}"`);
            }
        }

        function submitPlayer() {
            if (!gameActive) return;
            if (currentTurn !== 'human') {
                showMessage('Wait for your turn!', true);
                return;
            }
            if (humanEliminated || aiEliminated) return;

            const playerName = playerInput.value.trim();
            if (!playerName) {
                showMessage('Please enter a player name!', true);
                return;
            }

            if (!isValidPlayer(playerName, currentLetter)) {
                const players = playersByLetter[currentLetter] || [];
                const exists = players.some(p => p.toLowerCase() === playerName.toLowerCase());
                const notUsed = !usedPlayers.some(p => p.toLowerCase() === playerName.toLowerCase());
                
                if (!exists) {
                    showMessage(`"${playerName}" is not in our database or doesn't start with "${currentLetter}"!`, true);
                } else if (!notUsed) {
                    showMessage(`"${playerName}" has already been used!`, true);
                }
                playerInput.value = '';
                return;
            }

            usedPlayers.push(playerName);
            updateUsedList();
            showMessage(`✅ You said: ${playerName}`);
            playerInput.value = '';
            switchTurn();
        }

        function humanOut() {
            if (!gameActive) return;
            if (currentTurn !== 'human') {
                showMessage('Wait for your turn to say "I AM OUT"!', true);
                return;
            }
            if (humanEliminated || aiEliminated) return;
            
            showMessage('You said "I AM OUT". AI wins!', false);
            humanEliminated = true;
            humanStatus.textContent = 'ELIMINATED ❌';
            humanCard.classList.add('eliminated');
            endGame('ai');
        }

        function startNewGame() {
            if (Object.keys(playersByLetter).length === 0) {
                showMessage('Database not loaded yet. Please wait...', true);
                return;
            }
            
            currentLetter = getRandomLetter();
            currentTurn = 'human';
            gameActive = true;
            humanEliminated = false;
            aiEliminated = false;
            usedPlayers = [];
            
            currentLetterEl.textContent = currentLetter;
            turnIndicatorEl.textContent = '👤 YOUR Turn';
            turnIndicatorEl.className = 'turn-indicator turn-human';
            humanCard.classList.remove('eliminated');
            aiCard.classList.remove('eliminated');
            humanStatus.textContent = 'Playing';
            aiStatus.textContent = 'Playing';
            humanCard.classList.add('active');
            aiCard.classList.remove('active');
            playerInput.disabled = false;
            submitBtn.disabled = false;
            outBtn.disabled = false;
            playerInput.value = '';
            updateUsedList();
            
            const totalPlayers = Object.values(playersByLetter).flat().length;
            showMessage(`Game started! ${totalPlayers.toLocaleString()} players loaded. Name a player starting with "${currentLetter}"`);
            playerInput.focus();
        }

        // Load CSV file
        async function loadPlayerData() {
            try {
                // Try to load players.csv from the same folder
                const response = await fetch('players.csv');
                if (response.ok) {
                    const csvText = await response.text();
                    parseCSV(csvText);
                } else {
                    throw new Error('CSV not found');
                }
            } catch (error) {
                console.log('No CSV file found, using embedded database');
                useEmbeddedDatabase();
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            if (lines.length < 2) {
                useEmbeddedDatabase();
                return;
            }
            
            const headers = lines[0].split(',');
            
            // Find the player name column
            let nameColumnIndex = headers.findIndex(h => 
                h.toLowerCase().includes('name') || 
                h.toLowerCase() === 'player_name' ||
                h.toLowerCase() === 'player' ||
                h.toLowerCase() === 'full_name'
            );
            
            if (nameColumnIndex === -1) nameColumnIndex = 0;
            
            // Initialize players by letter (A-Z)
            for (let i = 0; i < 26; i++) {
                const letter = String.fromCharCode(65 + i);
                playersByLetter[letter] = [];
            }
            
            // Parse each row
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Parse CSV with quote handling
                const values = [];
                let inQuote = false;
                let currentValue = '';
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        values.push(currentValue.trim());
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                values.push(currentValue.trim());
                
                if (values.length > nameColumnIndex) {
                    let playerName = values[nameColumnIndex].replace(/^"|"$/g, '');
                    if (playerName && playerName.length > 0 && !playerName.includes('N/A')) {
                        const firstLetter = playerName.charAt(0).toUpperCase();
                        if (playersByLetter[firstLetter] && !playersByLetter[firstLetter].includes(playerName)) {
                            playersByLetter[firstLetter].push(playerName);
                        }
                    }
                }
            }
            
            // Remove empty letters and sort
            for (let letter in playersByLetter) {
                playersByLetter[letter] = [...new Set(playersByLetter[letter])].sort();
            }
            
            finishLoading();
        }

        function useEmbeddedDatabase() {
            // Embedded database of professional footballers
            playersByLetter = {
                'A': ['Aaron Wan-Bissaka', 'Achraf Hakimi', 'Adama Traore', 'Adrien Rabiot', 'Sergio Aguero', 'David Alaba', 'Trent Alexander-Arnold', 'Alisson Becker', 'Dele Alli', 'Nicolas Anelka', 'Antony', 'Pierre-Emerick Aubameyang', 'Cesar Azpilicueta', 'Marco Asensio'],
                'B': ['Gareth Bale', 'Jude Bellingham', 'Karim Benzema', 'Bernardo Silva', 'Bruno Fernandes', 'Sadio Mane', 'Leon Bailey'],
                'C': ['Joao Cancelo', 'Casemiro', 'Edinson Cavani', 'Philippe Coutinho', 'Andrew Robertson', 'Cristiano Ronaldo'],
                'D': ['Kevin De Bruyne', 'Frenkie de Jong', 'Matthijs de Ligt', 'Paulo Dybala', 'Arjen Robben', 'Memphis Depay'],
                'E': ['Eden Hazard', 'Ederson', 'Christian Eriksen', 'Samuel Eto\'o', 'Cesc Fabregas'],
                'F': ['Fabinho', 'Radamel Falcao', 'Roberto Firmino', 'Steven Gerrard'],
                'G': ['Olivier Giroud', 'Leon Goretzka', 'Antoine Griezmann', 'Ilkay Gundogan'],
                'H': ['Kai Havertz', 'Lucas Hernandez', 'Gonzalo Higuain', 'Mats Hummels', 'Zlatan Ibrahimovic'],
                'I': ['Zlatan Ibrahimovic', 'Romelu Lukaku', 'Raul Jimenez'],
                'J': ['Jude Bellingham', 'Phil Jones', 'Jorginho', 'Josko Gvardiol'],
                'K': ['Harry Kane', 'N\'Golo Kante', 'Toni Kroos', 'Frank Lampard', 'Robert Lewandowski', 'Kylian Mbappe'],
                'L': ['Frank Lampard', 'Robert Lewandowski', 'Kylian Mbappe', 'Lionel Messi', 'Luka Modric'],
                'M': ['Kylian Mbappe', 'Lionel Messi', 'Luka Modric', 'Thomas Muller', 'Manuel Neuer', 'Sadio Mane', 'Lautaro Martinez'],
                'N': ['Manuel Neuer', 'Lautaro Martinez', 'Paul Pogba', 'Christian Pulisic', 'Marcus Rashford', 'Andrew Robertson', 'Neymar Jr'],
                'O': ['Victor Osimhen', 'Martin Odegaard', 'Michael Owen', 'Mesut Ozil'],
                'P': ['Paul Pogba', 'Christian Pulisic', 'Marcus Rashford', 'Cristiano Ronaldo', 'Bukayo Saka'],
                'Q': ['Michael Owen', 'Mesut Ozil', 'Pedri'],
                'R': ['Marcus Rashford', 'Cristiano Ronaldo', 'Bukayo Saka', 'Leroy Sane', 'Jadon Sancho', 'Mohamed Salah'],
                'S': ['Bukayo Saka', 'Leroy Sane', 'Jadon Sancho', 'Mohamed Salah', 'Luis Suarez', 'Son Heung-min'],
                'T': ['Luis Suarez', 'Son Heung-min', 'Thiago Alcantara', 'Virgil van Dijk'],
                'U': ['Caglar Soyuncu', 'Arturo Vidal', 'Alphonso Davies'],
                'V': ['Virgil van Dijk', 'Raphael Varane', 'Arturo Vidal'],
                'W': ['Theo Walcott', 'Kyle Walker', 'Hakim Ziyech', 'Granit Xhaka'],
                'X': ['Granit Xhaka', 'Hakim Ziyech', 'Xherdan Shaqiri'],
                'Y': ['Hakim Ziyech', 'Mario Balotelli', 'Ben Chilwell'],
                'Z': ['Hakim Ziyech', 'Mario Balotelli', 'Ben Chilwell', 'Dominic Calvert-Lewin']
            };
            
            finishLoading();
        }

        function finishLoading() {
            // Calculate stats
            let totalPlayers = 0;
            let lettersWithPlayers = 0;
            
            for (let letter in playersByLetter) {
                if (playersByLetter[letter].length > 0) {
                    totalPlayers += playersByLetter[letter].length;
                    lettersWithPlayers++;
                }
            }
            
            // Update stats display
            databaseInfo.innerHTML = `📊 Database loaded: ${totalPlayers.toLocaleString()} professional footballers across ${lettersWithPlayers} letters!`;
            statsInfo.innerHTML = `🎯 ${totalPlayers.toLocaleString()} players ready | Challenge the AI!`;
            
            // Hide loading screen, show game
            loadingScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            
            // Start game
            startNewGame();
            
            console.log('%c⚽ FOOTBALL PLAYER NAME GAME', 'color: #1a472a; font-size: 16px; font-weight: bold;');
            console.log(`%c✅ Loaded ${totalPlayers.toLocaleString()} professional footballers!`, 'color: #2ecc71; font-size: 12px;');
        }

        // Event listeners
        submitBtn.addEventListener('click', submitPlayer);
        outBtn.addEventListener('click', humanOut);
        newGameBtn.addEventListener('click', startNewGame);
        playerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && currentTurn === 'human' && gameActive) {
                submitPlayer();
            }
        });

        // Load the data
        loadPlayerData();
    </script>
</body>
</html>
